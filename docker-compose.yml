version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: omnisolve_postgres
    environment:
      POSTGRES_USER: omnisolve_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omnisolve_secure_password_change_in_prod}
      POSTGRES_DB: omnisolve_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - omnisolve_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnisolve_user -d omnisolve_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: omnisolve_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-omnisolve_redis_password_change_in_prod}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - omnisolve_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./omnisolve-backend
      dockerfile: Dockerfile
    container_name: omnisolve_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3001}
      DATABASE_URL: postgresql://omnisolve_user:${POSTGRES_PASSWORD:-omnisolve_secure_password_change_in_prod}@postgres:5432/omnisolve_db
      SHADOW_DATABASE_URL: postgresql://omnisolve_user:${POSTGRES_PASSWORD:-omnisolve_secure_password_change_in_prod}@postgres:5432/omnisolve_shadow_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-omnisolve_redis_password_change_in_prod}
      REDIS_DB: 0
      JWT_SECRET: ${JWT_SECRET:-change_this_to_32_character_random_string_in_production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET}
      YOUTUBE_CALLBACK_URL: ${YOUTUBE_CALLBACK_URL:-http://localhost:3001/api/auth/youtube/callback}
      INSTAGRAM_APP_ID: ${INSTAGRAM_APP_ID}
      INSTAGRAM_APP_SECRET: ${INSTAGRAM_APP_SECRET}
      INSTAGRAM_CALLBACK_URL: ${INSTAGRAM_CALLBACK_URL:-http://localhost:3001/api/auth/instagram/callback}
      TIKTOK_CLIENT_KEY: ${TIKTOK_CLIENT_KEY}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET}
      TIKTOK_CALLBACK_URL: ${TIKTOK_CALLBACK_URL:-http://localhost:3001/api/auth/tiktok/callback}
      STORAGE_PATH: /app/storage/videos
      TEMP_PATH: /app/storage/temp
      ENABLE_CAPTION_WORKER: "true"
      ENABLE_RENDER_WORKER: "true"
      ENABLE_PUBLISH_WORKER: "true"
      WHISPER_MODEL: base
      WHISPER_DEVICE: cuda
      WHISPER_DEVICE_INDEX: 0
      FFMPEG_PATH: /usr/bin/ffmpeg
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    ports:
      - "3001:3001"
    volumes:
      - ./omnisolve-backend/src:/app/src
      - ./omnisolve-backend/dist:/app/dist
      - backend_storage:/app/storage
    networks:
      - omnisolve_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stdin_open: true
    tty: true

  caption-worker:
    build:
      context: ./omnisolve-backend
      dockerfile: Dockerfile
    container_name: omnisolve_caption_worker
    command: npm run worker:caption
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://omnisolve_user:${POSTGRES_PASSWORD:-omnisolve_secure_password_change_in_prod}@postgres:5432/omnisolve_db
      SHADOW_DATABASE_URL: postgresql://omnisolve_user:${POSTGRES_PASSWORD:-omnisolve_secure_password_change_in_prod}@postgres:5432/omnisolve_shadow_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-omnisolve_redis_password_change_in_prod}
      REDIS_DB: 0
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      STORAGE_PATH: /app/storage/videos
      TEMP_PATH: /app/storage/temp
      WHISPER_MODEL: base
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cuda}
      WHISPER_DEVICE_INDEX: 0
      FFMPEG_PATH: /usr/bin/ffmpeg
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - ./omnisolve-backend/src:/app/src
      - ./omnisolve-backend/dist:/app/dist
      - backend_storage:/app/storage
    networks:
      - omnisolve_network
    restart: unless-stopped
    stdin_open: true
    tty: true

  render-worker:
    build:
      context: ./omnisolve-backend
      dockerfile: Dockerfile
    container_name: omnisolve_render_worker
    command: npm run worker:render
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://omnisolve_user:${POSTGRES_PASSWORD:-omnisolve_secure_password_change_in_prod}@postgres:5432/omnisolve_db
      SHADOW_DATABASE_URL: postgresql://omnisolve_user:${POSTGRES_PASSWORD:-omnisolve_secure_password_change_in_prod}@postgres:5432/omnisolve_shadow_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-omnisolve_redis_password_change_in_prod}
      REDIS_DB: 0
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      STORAGE_PATH: /app/storage/videos
      TEMP_PATH: /app/storage/temp
      FFMPEG_PATH: /usr/bin/ffmpeg
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - ./omnisolve-backend/src:/app/src
      - ./omnisolve-backend/dist:/app/dist
      - backend_storage:/app/storage
    networks:
      - omnisolve_network
    restart: unless-stopped
    stdin_open: true
    tty: true

  publish-worker:
    build:
      context: ./omnisolve-backend
      dockerfile: Dockerfile
    container_name: omnisolve_publish_worker
    command: npm run worker:publish
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://omnisolve_user:${POSTGRES_PASSWORD:-omnisolve_secure_password_change_in_prod}@postgres:5432/omnisolve_db
      SHADOW_DATABASE_URL: postgresql://omnisolve_user:${POSTGRES_PASSWORD:-omnisolve_secure_password_change_in_prod}@postgres:5432/omnisolve_shadow_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-omnisolve_redis_password_change_in_prod}
      REDIS_DB: 0
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      STORAGE_PATH: /app/storage/videos
      TEMP_PATH: /app/storage/temp
      FFMPEG_PATH: /usr/bin/ffmpeg
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - ./omnisolve-backend/src:/app/src
      - ./omnisolve-backend/dist:/app/dist
      - backend_storage:/app/storage
    networks:
      - omnisolve_network
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_storage:
    driver: local

networks:
  omnisolve_network:
    driver: bridge
